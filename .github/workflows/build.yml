name: Build Booger Client

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Gradle 8.11.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.14-bin.zip
          unzip -q gradle-8.14-bin.zip
          echo "$PWD/gradle-8.14/bin" >> $GITHUB_PATH
      - name: Build mod
        run: gradle build

      - uses: actions/upload-artifact@v4
        with:
          name: boogerclient-1.0.0
          path: build/libs/boogerclient-1.0.0.jar
