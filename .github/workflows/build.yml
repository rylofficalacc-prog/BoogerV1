name: Build Booger Client

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
      - run: chmod +x gradlew
      - run: curl -L -o gradle/wrapper/gradle-wrapper.jar "https://raw.githubusercontent.com/nicowillis/gradle-wrapper-jar/main/gradle-wrapper.jar"
      - run: ./gradlew build
      - uses: actions/upload-artifact@v4
        with:
          name: boogerclient-1.0.0
          path: build/libs/boogerclient-1.0.0.jar
